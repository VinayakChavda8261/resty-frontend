<div class="flex h-screen bg-gray-100 font-sans">
  <!-- Sidebar -->
  <aside class="w-64 bg-slate-900 text-white flex flex-col">
    <div class="p-6 text-2xl font-bold border-b border-slate-700 text-orange-500">
      RestoAdmin
    </div>
    
    <nav class="flex-1 mt-4">
      <!-- Live Orders Link -->
      <a routerLink="/dashboard/orders" routerLinkActive="bg-slate-800 border-l-4 border-orange-500" class="flex items-center px-6 py-3 text-gray-400 hover:bg-slate-800 hover:text-white transition">
        <span class="ml-3">Live Orders</span>
      </a>
      
      <!-- Menu Management Link -->
      <a routerLink="/dashboard/menu" routerLinkActive="bg-slate-800 border-l-4 border-orange-500" class="flex items-center px-6 py-3 text-gray-400 hover:bg-slate-800 hover:text-white transition">
        <span class="ml-3">Menu Management</span>
      </a>

      <a routerLink="/dashboard/tables" routerLinkActive="bg-slate-800 border-l-4 border-orange-500" class="flex items-center px-6 py-3 text-gray-400 hover:bg-slate-800 hover:text-white transition">
        <span class="ml-3">Tables & QR</span>
      </a>
    </nav>

    <div class="p-4 border-t border-slate-700">
      <button (click)="onLogout()" class="flex items-center text-red-400 hover:text-red-300 w-full px-2">
        <span>Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="bg-white shadow px-6 py-4 flex justify-between items-center border-b border-gray-200">
      <!-- Isse bhi dynamic bana sakte hain baad mein, abhi ke liye Dashboard rehne do -->
      <h1 class="text-xl font-semibold text-gray-800 uppercase tracking-wider">Dashboard</h1>
      <div class="flex items-center gap-4">
        <span class="flex h-3 w-3 rounded-full bg-green-500 animate-pulse"></span>
        <span class="text-sm text-gray-500">System Online</span>
      </div>
    </header>

    <!-- Page Content (AB YEH DYNAMIC HAI) -->
    <div class="flex-1 overflow-y-auto p-6 bg-gray-50">
      <router-outlet></router-outlet> 
    </div>
  </main>
</div>
