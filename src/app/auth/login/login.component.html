<div class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="bg-white p-8 rounded-lg shadow-lg w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-orange-600">Restaurant Admin</h2>
        <form (submit)="onSubmit()">
            <div class="mb-4">
                <label class="block text-gray-700">Email</label>
                <input type="email" [(ngModel)]="email" name="email"
                    class="w-full p-2 border rounded mt-1 focus:outline-orange-500" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700">Password</label>
                <input type="password" [(ngModel)]="password" name="password"
                    class="w-full p-2 border rounded mt-1 focus:outline-orange-500" required>
            </div>
            <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-100 text-red-700 text-sm rounded border border-red-200">
                {{ errorMessage }}
            </div>
            <button type="submit" class="w-full bg-orange-600 text-white p-2 rounded hover:bg-orange-700 transition">
                Login to Dashboard
            </button>
        </form>
    </div>
</div>
